server:
  port: 18601

spring:
  application:
    name: reachai-model-service
  datasource:
    url: ${AI_MYSQL_URL:jdbc:mysql://${AI_MYSQL_HOST:localhost}:${AI_MYSQL_PORT:3306}/${AI_MYSQL_DATABASE:reach_ai}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${AI_MYSQL_USER:reach_ai}
    password: ${AI_MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

model:
  credential-secret: ${MODEL_CREDENTIAL_SECRET:dev-only-change-me-please-32-bytes}

logging:
  level:
    com.enterprise.ai.model: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
