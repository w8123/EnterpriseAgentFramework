project:
  name: "ai-text-retrieval"
  baseUrl: "http://localhost:8080"
  contextPath: "/ai"
tools:
- name: "retrieval_test"
  description: "POST /ai/retrieval/test — 检索测试"
  method: "POST"
  path: "/retrieval/test"
  endpoint: "POST /ai/retrieval/test"
  parameters:
  - name: "body_json"
    type: "json"
    description: "JSON 请求体，对应 RetrievalTestRequest"
    required: true
    location: "BODY"
  requestBodyType: "RetrievalTestRequest"
  responseType: "RetrievalTestResponse"
  source:
    scanner: "controller"
    location: "RetrievalController.java#RetrievalController#test"
