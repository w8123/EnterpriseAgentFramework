server:
  port: ${SERVER_PORT:18604}

spring:
  application:
    name: reachai-runtime-service

  datasource:
    url: ${AI_MYSQL_URL:jdbc:mysql://${AI_MYSQL_HOST:localhost}:${AI_MYSQL_PORT:3306}/${AI_MYSQL_DATABASE:reach_ai}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${AI_MYSQL_USER:reach_ai}
    password: ${AI_MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

services:
  control-service:
    url: ${CONTROL_SERVICE_URL:http://localhost:18603}
  capability-service:
    url: ${CAPABILITY_SERVICE_URL:http://localhost:18605}
  model-service:
    url: ${MODEL_SERVICE_URL:http://localhost:18601}
  knowledge-service:
    url: ${KNOWLEDGE_SERVICE_URL:http://localhost:18602}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
