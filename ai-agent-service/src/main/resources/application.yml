server:
  port: 8081

spring:
  application:
    name: ai-agent-service

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ai_text_service?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:false}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:false}
        file-extension: yml

# ==================== 服务间调用 ====================
services:
  model-service:
    url: ${MODEL_SERVICE_URL:http://localhost:8090}
  text-service:
    url: ${TEXT_SERVICE_URL:http://localhost:8080}

# ==================== 极视角平台（仅保留业务工具能力） ====================
jishi:
  platform:
    base-url: ${JISHI_BASE_URL:http://127.0.0.1:31003}
    api-key: ${JISHI_API_KEY:123456}
    timeout: 30000
    agents:
      default-chat:
        app-id: 2014777d-3eea-4a0c-b3cc-569c212b31f3
        name: 默认对话智能体
        description: 极视角业务工具（会话管理、文件上传、工作流交互）

# ==================== 业务系统 ====================
business:
  system:
    base-url: ${BUSINESS_SYSTEM_URL:http://localhost:8082}
    timeout: 10000

# ==================== AgentScope ====================
# Agent 的 LLM 调用统一通过 model-service 的 OpenAI 兼容代理端点
agentscope:
  model:
    name: qwen-max

# ==================== Agent 配置 ====================
agent:
  max-steps: 5
  default-timeout: 60000
  definitions:
    file: ${AGENT_DEF_FILE:agent-definitions.json}
  agents:
    query-data: false
    knowledge-qa: true
    business-operation: false
    analysis: false
    creative-task: true
    general-chat: true
  intent:
    system-prompt: |
      你是一个意图识别专家。请分析用户的输入，判断用户意图属于以下哪个类别：
      1. QUERY_DATA - 问数/数据查询（如：查询某个数据、统计某项指标）
      2. KNOWLEDGE_QA - 知识问答（如：查询制度规定、操作流程、技术规范）
      3. BUSINESS_OPERATION - 业务操作（如：发起审批、提交工单、执行业务动作）
      4. ANALYSIS - 数据分析（如：对比分析、趋势分析、综合评估、给出建议）
      5. GENERAL_CHAT - 闲聊（不属于以上类别的一般对话）
      请只返回意图类别名称，不要返回其他内容。

# ==================== 会话记忆 ====================
memory:
  max-messages: 20
  ttl-hours: 24

# ==================== RAG（通过 ai-text-service） ====================
rag:
  top-k: 5
  score-threshold: 0.7

# ==================== 日志 ====================
logging:
  level:
    com.enterprise.ai.agent: DEBUG
    io.agentscope: DEBUG

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
