server:
  port: 8601

spring:
  application:
    name: ai-model-service
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-c1a339208eb24388bc736710c4daadd6}
      chat:
        options:
          model: qwen-max
          temperature: 0.7
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:false}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:false}
        file-extension: yml

# 模型网关配置
model:
  default-provider: tongyi
  # 小米 MiMo（OpenAI 兼容，请求头 api-key）。配置非空 api-key 后自动注册 provider「mimo」
  mimo:
    api-key: ${MIMO_API_KEY:sk-ctg3qfd8m2tdo10qy1uor5x1arysho0zn02wkue1gzvmv9vb}
    base-url: https://api.xiaomimimo.com
    default-model: mimo-v2.5-pro
    models:
      - mimo-v2.5-pro
    max-completion-tokens: 1024
    temperature: 1.0
    top-p: 0.95
    frequency-penalty: 0
    presence-penalty: 0
  tongyi:
    api-key: ${DASHSCOPE_API_KEY:sk-c1a339208eb24388bc736710c4daadd6}
    embedding:
      model: text-embedding-v2
      endpoint: https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding
      batch-size: 25
      dimension: 1536

logging:
  level:
    com.enterprise.ai.model: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
