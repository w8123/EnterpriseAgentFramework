server:
  port: 8602
  servlet:
    context-path: /ai

spring:
  application:
    name: ai-skills-service

  datasource:
    url: ${AI_MYSQL_URL:jdbc:mysql://39.106.238.224:33106/ai_text_service?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${AI_MYSQL_USER:ai_text_service}
    password: ${AI_MYSQL_PASSWORD:4LaGtyK6y2siSMir}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:false}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:false}
        file-extension: yml

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ---- Milvus 配置 ----
milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  dimension: 1536

# ---- Embedding 配置 ----
# 【当前模式】provider: model-service —— 通过 Feign 调用 ai-model-service（POST /model/embedding）
#            由 ai-model-service 统一管理 API Key 并转发到通义 DashScope
# 【切换直连】将 provider 改为 tongyi，并填写下方 tongyi.api-key，
#            则本服务直接 HTTP 调用 DashScope Embedding API，不经过 ai-model-service
embedding:
  provider: model-service
  model-service:
    url: ${MODEL_SERVICE_URL:http://localhost:8601}
  tongyi:
    api-key: ${DASHSCOPE_API_KEY:sk-your-key-here}
    model: text-embedding-v2
    endpoint: https://dashscope.aliyuncs.com/api/v1/services/embeddings/text-embedding/text-embedding
    batch-size: 25

# ---- LLM 配置 ----
# 【当前模式】provider: model-service —— 通过 Feign 调用 ai-model-service（POST /model/chat）
#            由 ai-model-service 统一管理 API Key 并借助 Spring AI Alibaba 与通义 DashScope 通信
# 【切换直连】将 provider 改为 tongyi，并填写下方 tongyi.api-key，
#            则本服务直接 HTTP 调用 DashScope Text Generation API，不经过 ai-model-service
llm:
  provider: model-service
  model-service:
    url: ${MODEL_SERVICE_URL:http://localhost:8601}
  tongyi:
    api-key: ${DASHSCOPE_API_KEY:sk-your-key-here}
    model: qwen-max
    endpoint: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation

# ---- RAG 配置 ----
rag:
  default-top-k: 5
  score-threshold: 0.5

# ---- Pipeline 入库流水线配置 ----
pipeline:
  definitions:
    default:
      steps:
        - FILE_PARSE
        - TEXT_CLEAN
        - CHUNK
        - EMBEDDING
        - VECTOR_STORE
        - METADATA_PERSIST
    kb_contract:
      steps:
        - FILE_PARSE
        - TEXT_CLEAN
        - CHUNK
        - EMBEDDING
        - VECTOR_STORE
        - METADATA_PERSIST
    kb_scan:
      steps:
        - FILE_PARSE
        - OCR
        - TEXT_CLEAN
        - CHUNK
        - EMBEDDING
        - VECTOR_STORE
        - METADATA_PERSIST

spring.servlet.multipart:
  max-file-size: 50MB
  max-request-size: 100MB

logging:
  level:
    com.enterprise.ai: DEBUG
    io.milvus: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
