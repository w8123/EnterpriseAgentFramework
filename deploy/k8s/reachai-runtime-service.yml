apiVersion: apps/v1
kind: Deployment
metadata:
  name: reachai-runtime-service
  labels:
    app: reachai-runtime-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reachai-runtime-service
  template:
    metadata:
      labels:
        app: reachai-runtime-service
    spec:
      containers:
        - name: reachai-runtime-service
          image: registry.enterprise.com/ai/reachai-runtime-service:latest
          ports:
            - containerPort: 18604
          env:
            - name: SERVER_PORT
              value: "18604"
            - name: AI_MYSQL_URL
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: mysql-url
            - name: AI_MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: mysql-user
            - name: AI_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: mysql-password
            - name: CAPABILITY_SERVICE_URL
              value: http://reachai-capability-service:18605
            - name: MODEL_SERVICE_URL
              value: http://reachai-model-service:18601
            - name: KNOWLEDGE_SERVICE_URL
              value: http://reachai-knowledge-service:18602
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1.5Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 18604
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 18604
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: reachai-runtime-service
spec:
  selector:
    app: reachai-runtime-service
  ports:
    - port: 18604
      targetPort: 18604
  type: ClusterIP
