apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-text-service
  labels:
    app: ai-text-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-text-service
  template:
    metadata:
      labels:
        app: ai-text-service
    spec:
      containers:
        - name: ai-text-service
          image: registry.enterprise.com/ai/ai-text-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: MYSQL_URL
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: mysql-url
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: mysql-password
            - name: REDIS_HOST
              value: redis
            - name: MILVUS_HOST
              value: milvus
            - name: MODEL_SERVICE_URL
              value: http://ai-model-service:8090
            - name: NACOS_ADDR
              value: nacos:8848
            - name: NACOS_ENABLED
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /ai/actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-text-service
spec:
  selector:
    app: ai-text-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
