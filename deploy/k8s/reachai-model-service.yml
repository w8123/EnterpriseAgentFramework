apiVersion: apps/v1
kind: Deployment
metadata:
  name: reachai-model-service
  labels:
    app: reachai-model-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reachai-model-service
  template:
    metadata:
      labels:
        app: reachai-model-service
    spec:
      containers:
        - name: reachai-model-service
          image: registry.enterprise.com/ai/reachai-model-service:latest
          ports:
            - containerPort: 18601
          env:
            - name: AI_MYSQL_URL
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: mysql-url
            - name: AI_MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: mysql-user
            - name: AI_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: mysql-password
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secrets
                  key: dashscope-api-key
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 18601
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 18601
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: reachai-model-service
spec:
  selector:
    app: reachai-model-service
  ports:
    - port: 18601
      targetPort: 18601
  type: ClusterIP
